<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sift</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Collapsed: just the sprite icon -->
    <div id="collapsed-view">
      <button id="sprite-btn" aria-label="Open Sift">
        <img src="sift-icon.png" alt="Sift" class="sprite-img" />
      </button>
    </div>

    <!-- Expanded: full panel with tabs -->
    <div id="expanded-view" class="hidden">
      <div class="panel">
        <div class="panel-header" data-tauri-drag-region>
          <img src="sift-logo.png" alt="Sift" class="brand-logo" data-tauri-drag-region />
          <button id="btn-minimize" class="btn-icon" aria-label="Minimize">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7.25" width="10" height="1.5" rx="0.75" fill="currentColor"/>
            </svg>
          </button>
        </div>

        <div class="tab-bar">
          <button class="tab active" data-tab="chat">Chat</button>
          <button class="tab" data-tab="files">Files</button>
          <button class="tab" data-tab="preview">Preview</button>
        </div>

        <!-- Chat -->
        <div class="tab-content" id="tab-chat">
          <div id="log" aria-live="polite"></div>
          <form id="chat-form">
            <div class="input-row">
              <textarea id="msg" rows="1" placeholder="Enter for new line · ⌘↵ to send"></textarea>
              <button type="submit" class="btn-send" aria-label="Send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 2L11 13" /><path d="M22 2L15 22L11 13L2 9L22 2Z" />
                </svg>
              </button>
            </div>
          </form>
        </div>

        <!-- Files -->
        <div class="tab-content hidden" id="tab-files">
          <div class="files-search-row">
            <input type="text" id="files-search" class="files-search-input" placeholder="Filter or search files…" />
            <button type="button" class="btn-sm btn-search" id="btn-quick-search" title="Semantic search">&#128269;</button>
          </div>
          <p class="files-hint" id="files-hint">
            Files discovered by the agent appear here. Click to preview.
          </p>
          <div class="file-toolbar">
            <button type="button" class="btn-sm" id="btn-clear-files">Clear list</button>
          </div>
          <ul class="file-list" id="file-list"></ul>
        </div>

        <!-- Preview -->
        <div class="tab-content hidden" id="tab-preview">
          <div class="preview-top">
            <p class="preview-path" id="preview-path"></p>
            <button type="button" class="btn-sm" id="btn-close-preview">Close</button>
          </div>
          <div id="preview-body" class="preview-body is-hidden"></div>
          <p id="preview-placeholder" class="preview-placeholder">
            Select a file from the Files tab to preview it here.
          </p>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
